# Minimal gray-red-white TUI theme

[manager]
cwd = { fg = "#ff4444", bold = true }
hovered = { fg = "#f5f5f5", bg = "#4a1f1f", bold = true }
preview_hovered = { fg = "#f5f5f5", bg = "#4a1f1f" }
find_keyword = { fg = "#ff4444", bold = true }
find_position = { fg = "#f5f5f5", bg = "#4a1f1f", bold = true }
marker_copied = { fg = "#f2f2f2", bg = "#f2f2f2" }
marker_cut = { fg = "#ff4444", bg = "#ff4444" }
marker_marked = { fg = "#888888", bg = "#888888" }
marker_selected = { fg = "#ff4444", bg = "#ff4444" }

[tabs]
active = { fg = "#ff4444", bg = "reset", bold = true, underline = true }
inactive = { fg = "#888888", bg = "reset" }
sep_inner = { open = " ", close = " " }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#1e1e1e", bg = "#f2f2f2", bold = true }
normal_alt = { fg = "#f2f2f2", bg = "#414141" }
select_main = { fg = "#1e1e1e", bg = "#b0b0b0", bold = true }
select_alt = { fg = "#b0b0b0", bg = "#414141" }
unset_main = { fg = "#f5f5f5", bg = "#a52f2f", bold = true }
unset_alt = { fg = "#a52f2f", bg = "#414141" }

[status]
overall = { fg = "#d3d3d3", bg = "#303030" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
progress_label = { fg = "#f5f5f5", bold = true }
progress_normal = { fg = "#ff4444", bg = "#3a3a3a" }
progress_error = { fg = "#ff4444", bg = "#4a1f1f" }
perm_type = { fg = "#ff4444" }
perm_read = { fg = "#f2f2f2" }
perm_write = { fg = "#d76a6a" }
perm_exec = { fg = "#ff4444" }
perm_sep = { fg = "#747474" }

[which]
cols = 2
mask = { bg = "#151515" }
cand = { fg = "#ff4444", bold = true }
rest = { fg = "#888888" }
desc = { fg = "#d0d0d0" }
separator = "  ::  "
separator_style = { fg = "#3a3a3a" }

[confirm]
border = { fg = "#ff4444" }
title = { fg = "#f5f5f5", bold = true }
content = { fg = "#d0d0d0" }
list = { fg = "#d0d0d0" }
btn_yes = { fg = "#151515", bg = "#ff4444", bold = true }
btn_no = { fg = "#d0d0d0", bg = "#242424" }

[spot]
border = { fg = "#ff4444" }
title = { fg = "#f5f5f5", bold = true }
tbl_col = { fg = "#ff4444" }
tbl_cell = { fg = "#d0d0d0" }

[notify]
title_info = { fg = "#f2f2f2", bold = true }
title_warn = { fg = "#d76a6a", bold = true }
title_error = { fg = "#ff4444", bold = true }

[pick]
border = { fg = "#ff4444" }
active = { fg = "#f5f5f5", bg = "#4a1f1f" }
inactive = { fg = "#888888" }

[input]
border = { fg = "#ff4444" }
title = { fg = "#f5f5f5", bold = true }
value = { fg = "#d0d0d0" }
selected = { fg = "#f5f5f5", bg = "#4a1f1f" }

[cmp]
border = { fg = "#ff4444" }
active = { fg = "#f5f5f5", bg = "#4a1f1f" }
inactive = { fg = "#888888" }

[tasks]
border = { fg = "#ff4444" }
title = { fg = "#f5f5f5", bold = true }
hovered = { fg = "#f5f5f5", bg = "#4a1f1f" }

[help]
on = { fg = "#ff4444", bold = true }
run = { fg = "#f2f2f2" }
desc = { fg = "#888888" }
hovered = { fg = "#f5f5f5", bg = "#4a1f1f" }
footer = { fg = "#d0d0d0", bg = "#242424" }

[filetype]
rules = [
  { url = "*/", fg = "#ff4444", bold = true },
  { mime = "text/*", fg = "#d0d0d0" },
  { mime = "image/*", fg = "#b8b8b8" },
  { mime = "{audio,video}/*", fg = "#9b7b7b" },
  { mime = "application/{zip,gzip,x-tar,x-bzip*,x-7z-compressed,x-rar}", fg = "#d76a6a" },
  { mime = "application/{pdf,doc,rtf}", fg = "#f2f2f2" },
  { url = "*", fg = "#c9c9c9" }
]

[icon]
prepend_dirs = [
  { name = ".config", text = "󰒓", fg = "#ff4444" },
  { name = ".git", text = "", fg = "#d76a6a" }
]
